<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatSphere</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="auth-container">

        <div class="auth-left">
            <div class="logo">Con<span class="highlight">vex</span></div>
            <p class="tagline">The best place to hang out, chat in rooms,<br>and vibe with people in real time.</p>
            <div class="feature-list">
                <div class="feature-item">
                    <div class="icon">⚡</div>
                    Real-time messaging with WebSockets
                </div>
                <div class="feature-item">
                    <div class="icon">💬</div>
                    Multiple chat rooms to join
                </div>
                <div class="feature-item">
                    <div class="icon">😄</div>
                    Emoji reactions & typing indicators
                </div>
                <div class="feature-item">
                    <div class="icon">🔐</div>
                    Secure JWT authentication
                </div>
            </div>
        </div>

        <div class="auth-right">
            <h2>Welcome back 👋</h2>
            <p class="subtitle">Sign in or create a new account to start chatting</p>

            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('login', event)">Login</button>
                <button class="tab-btn" onclick="showTab('register', event)">Register</button>
            </div>

            <div id="login-tab">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="you@example.com" />
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" />
                </div>
                <button type="button" class="btn-primary" onclick="login()">Sign in →</button>
                <p id="login-error" class="error"></p>
            </div>

            <div id="register-tab" style="display:none">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="reg-username" placeholder="cooluser123" />
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="you@example.com" />
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" placeholder="••••••••" />
                </div>
                <button type="button" class="btn-primary" onclick="register()">Create account →</button>
                <p id="register-error" class="error"></p>
            </div>
        </div>

    </div>
    <script src="js/auth.js"></script>
</body>
